<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="Sami Cleaning Service (1).png">
    <title>Sami's Cleaning Service</title>

    <!-- AOS Library CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

    <style>

        /* Make body a flex column so footer sticks to bottom */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fffdf7;
            color: #333;
           background:#111111;
           

        }

        /* Header styling */
        header {
            /*background: linear-gradient(90deg, #242424, #0e0e0e);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;*/
             position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0); /* semi-transparent */
            backdrop-filter: blur(10px);     /* optional glass effect */
        }

        /* Logo styling */
        .logo img {
            width: 90px;
            height: 70px;
            border-radius: 5px;
        }

        /* Company name styling */
        .navigation a{
            color: white;
            text-decoration: none;
            margin-right: 30px;
            padding: 0px 10px;
            transition: color 0.3s ease, transform 0.3s ease;
            font-weight: bold;
            font-size: large;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom; /* keeps text grounded while stretching up */
        }

        /* Smooth hover effect */
        .navigation a:hover {
            font-weight: bold;
            color: #adadad;
            transform: translateY(-2px);
            text-decoration-line: underline;
            transform: scaleY(1.1) scaleX(0.95); /* tall and thin morph */
            color: #d5d5d5;
        }

        /* Main content expands to push footer */
        main {
            flex: 1;
        }

        /* Hero section */
        .hero {
            background: url(https://media1.tenor.com/m/8AtvqiYPm04AAAAd/cat-leaf.gif) center/cover repeat;
            height: 660px;
            padding-top: 100px;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 0px 6px 7px rgba(0,0,0,0.6);
            font-size: 40px;
            font-weight: bold;
        }

        .get-started-button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 18px;
            color: #fff;
            background: #1e90ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            perspective: 100px;
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
        }

        .get-started-button:hover {
            background: #1c86ee;
             transform: rotateX(10deg) rotateY(10deg) scale(1.1);
  text-shadow: 4px 10px 6px rgba(0,0,0,0.3);
            
        }
        .CompanyName {
            font-size: 24px;
            font-weight: bold;
            color: white;
            align-items: left;
            padding-right: 400px;
        }
        
        
        


        

    


        

        
        

        /* Footer */
        footer {
            background: #060607;
            color: white;
            text-align: center;
            padding: 20px 0;
        }

 
    </style>
</head>

<body>
    

    <!-- Header -->
    <header>

        <div class="logo">
            <img src="Sami Cleaning Service (1).png" alt="Our Logo" data-aos="zoom-in-up" data-aos-duration="1200" data-aos-easing="ease-out-back">
        </div>

        <div class="CompanyName" data-aos-easing="easing-out" data-aos="flip-up" data-aos-duration="1000"> 
        Sami's Cleaning Service
        </div>


        <div class="navigation">
            <a href="requestaquote.html" target="_self" data-aos="zoom-in-up" data-aos-duration="1000" data-aos-easing="ease-out-back">Request a Quote</a>
            <a href="#AboutUs" data-aos="zoom-in-up" data-aos-duration="1000" data-aos-easing="ease-out-back">About us</a>
            <a href="#Contact" data-aos="zoom-in-up" data-aos-duration="1000" data-aos-easing="ease-out-back">Contact</a>
            <a href="#AboutOwner" data-aos="zoom-in-up" data-aos-duration="1000" data-aos-easing="ease-out-back">About Owner</a>
            
        </div>
    </header>

    <!-- Main content -->
    <main>



        <div class="hero" >
            
             <h2 data-aos="fade-up"  data-aos-duration="1000">Welcome to Sami's Cleaning Service.</h2>
            <button class="get-started-button" data-aos="flip-up" data-aos-duration="2000" data-aos-easing="ease-out-back"> Get Started → </button>

        </div>
    </main>

    <!-- Footer -->
    <footer data-aos="fade-up">
        © 2026 Sami's Cleaning Service — All Rights Reserved
    </footer>

    <!-- AOS Library JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({
            
            once: true,
            easing: 'ease-in-out-cubic',
            offset: 100,
            
        });
    </script>

</body>
</html>
