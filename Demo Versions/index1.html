<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="Sami Cleaning Service (1).png">

    <title>Sami's Cleaning Service</title>

    <!-- AOS Library CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fffdf7;
            color: #333;
        }
        

        

        header {
            background: #060607;
            color: white;
            padding: 20px;
            

        }

        nav {
            background:  #000a40;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            font-weight: bold;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background: url('https://scrubnbubbles.com/wp-content/uploads/2022/05/cleaning-service.jpeg') center/cover no-repeat;
            height: 55vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 0px 2px 6px rgba(0,0,0,0.6);
            font-size: 40px;
            font-weight: bold;
        }

        section {
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            color:  #000a40;
        }

        .item {
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: white;
            transition: transform 0.3s;
        }

        .item:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            background:  #000a40;
            color: white;
            padding: 20px;
            margin-top: 20px;
        }

        #topBtn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background:  #000a40;
            color: white;
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>

<body>

    <header data-aos="fade-down">
        <div class="logo"><img src="Sami Cleaning Service (1).png" alt="Our Logo" width="90px" height="70px"></div>
        
    </header>

    <nav data-aos="fade-down" data-aos-delay="200">
        <a href="#about">About</a>
        
        <a href="#contact">Contact</a>
    </nav>

    <div class="hero" data-aos="fade-up">
        Welcome to Sami's Cleaning Service
    </div>

    <section id="about" data-aos="fade-right">
        <h2>About Us</h2>
        <p>
            idk we clean and stuff
    </section>


    <section id="contact" data-aos="fade-up">
        <h2>Contact</h2>
        <p><strong>Address:</strong> 123 Clean Street, Sparkle Town</p>
        <p><strong>Phone:</strong> (510) 943-8865</p>
        <p><strong>Hours:</strong> Mon–Sun: 8am – 6pm</p>
    </section>

    <footer data-aos="fade-up">
        © 2025 Sami's Cleaning Service — All Rights Reserved
    </footer>

    <button id="topBtn">↑ Top</button>

    <!-- AOS Library JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: false
        });

        const topBtn = document.getElementById("topBtn");

        window.onscroll = () => {
            topBtn.style.display = window.scrollY > 200 ? "block" : "none";
        };

        topBtn.onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
    </script>

</body>
</html>
